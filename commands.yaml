# =============================================================================
# Comandos de Voz para AirPaint — Reconocimiento Vosk (Español)
# =============================================================================
# Cada comando tiene:
#   - action:   Identificador interno que ejecuta la lógica en el frontend
#   - display:  Texto amigable que se muestra en la interfaz
#   - category: Grupo lógico (color, pincel, funcion, perfil)
#   - aliases:  Lista de variantes fonéticas que Vosk puede reconocer
#               (incluye errores comunes de pronunciación y reconocimiento)
# =============================================================================

